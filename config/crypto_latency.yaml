symbols:
  - btcusdt
  - ethusdt
  - solusdt
  - xrpusdt

source_consensus:
  min_sources: 2
  max_age_ms: 2500
  max_deviation_pct: 0.25

diagnostics:
  enabled: true
  thresholds_pct:
    - 0.03
    - 0.05
    - 0.08
    - 0.12
  write_artifacts: true

movement:
  min_move_pct: 0.08
  lookback_ms: 3000
  cooldown_ms: 5000

polymarket:
  max_spread_cents: 4.0
  min_depth_usd: 25.0
  min_seconds_to_expiry: 15
  max_seconds_to_expiry: 900

paper_opportunity:
  enabled: true
  amount_usd: 5.0
  model_probability_floor: 0.52
  model_probability_cap: 0.75
  delays_ms:
    - 0
    - 250
    - 500
    - 1000
    - 2000
    - 5000

recording:
  default_seconds: 300
  artifact_dir: artifacts/crypto_latency

runtime:
  poll_interval_ms: 250
  max_record_seconds: 900
  min_record_seconds: 10
  event_cooldown_ms: 5000
  max_events_per_recording: 500
  require_polymarket_bbo: true

rtds:
  enabled: true
  endpoint: "wss://ws-live-data.polymarket.com"
  ping_interval_seconds: 5
  topic: "crypto_prices"
  type: "update"
  filters:
    - btcusdt
    - ethusdt
    - solusdt
    - xrpusdt
  accepted_price_fields:
    - value
    - price
    - last

market_discovery:
  query_terms:
    - bitcoin up down
    - ethereum up down
    - solana up down
    - xrp up down
  max_markets: 20
  refresh_seconds: 60
