market_quality:
  min_best_ask: 0.03
  max_best_ask: 0.97
  min_best_bid: 0.01
  max_spread_cents: 4.0
  min_depth_within_2pct_usd: 10.0
  min_depth_within_5pct_usd: 25.0
  require_both_sides_bbo: true
  reject_if_no_best_bid: true
  reject_if_no_best_ask: true
  reject_if_extreme_price: true
  reject_if_empty_book: true

watchlist:
  auto_disable_bad_markets: true
  bad_market_reasons:
    - no_best_bid
    - no_best_ask
    - extreme_low_ask
    - extreme_high_ask
    - extreme_low_bid
    - no_executable_fill
    - lottery_ticket
  min_good_tokens_per_market: 2
