lifecycle:
  enabled: true
  exit_models:
    take_profit_cents: 8.0
    stop_loss_cents: 4.0
    timeout_seconds: 900
    allow_resolution_exit: false
  mark_to_market_interval_seconds: 5
  close_on_market_resolved: true

paper:
  amount_usd: 5.0
  max_open_positions: 5
  order_type: fok

reporting:
  write_artifacts: true
  artifact_dir: artifacts/forward_paper
  include_event_samples: true
  max_event_samples: 50

calibration:
  exploratory_mode: true
  threshold_grid_pct:
    - 0.01
    - 0.02
    - 0.03
    - 0.05
    - 0.08
  min_strategy_threshold_pct: 0.03

quality:
  min_signals_for_strategy_eval: 30
  min_closed_positions_for_pnl_eval: 20
  warn_if_no_signals: true
  warn_if_no_closed_positions: true
  warn_if_exploratory_threshold: true
